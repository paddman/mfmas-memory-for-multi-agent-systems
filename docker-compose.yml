services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memoryvault}
      POSTGRES_USER: ${POSTGRES_USER:-memoryvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - memoryvault_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memoryvault} -d ${POSTGRES_DB:-memoryvault}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://memoryvault:change-me@postgres:5432/memoryvault}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  memoryvault_postgres:
