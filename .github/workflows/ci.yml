name: MemoryVault CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile Python
        run: python -m compileall -q app ../demo
      - name: Import FastAPI application
        run: python -c "from app.main import app; assert app.title == 'NT MemoryVault API'; print(app.title)"
